# ──────────────────────────────────────────────────────────────────────────
# wrangler.toml — Configuration Cloudflare Pages — MaisonCBDVape
# ──────────────────────────────────────────────────────────────────────────

name = "maisoncbdvape"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "public"

# ─── Variables d'environnement ────────────────────────────────────────────
# ⚠ Pour les projets Pages connectés à GitHub, les [vars] ci-dessous
#   ne s'appliquent qu'en LOCAL (wrangler pages dev).
#   En PRODUCTION, toutes les variables doivent être dans le dashboard :
#   Cloudflare Pages → Settings → Environment variables
#
# Variables à configurer dans le dashboard :
#   PLAINTEXT :
#     SITE_URL               = https://maisoncbdvape.pages.dev  ← temporaire (→ .fr quand domaine connecté)
#     PAYGREEN_ENV           = sandbox   (→ "production" au lancement)
#     PAYGREEN_SHOP_ID       = sh_xxxxxxxxxxxxxxxxxxxxxxxxxxxx
#     PAYGREEN_HMAC_KEY      = (depuis le Listener PayGreen dashboard)
#     EMAIL_FROM             = MaisonCBDVape <noreply@maisoncbdvape.fr>
#     EMAIL_REPLY_TO         = contact@maisoncbdvape.fr
#     EMAIL_MERCHANT         = vincent.kotowski@ikmail.com,contact@maisoncbdvape.fr
#     GITHUB_OAUTH_CLIENT_ID = Ov23liwMg8Mc7uBdzJj3
#     GITHUB_REPO            = FlowPesci/maisoncbdvape
#     ADMIN_GITHUB_USERS     = FlowPesci
#   SECRETS (chiffrés) :
#     RESEND_API_KEY
#     GITHUB_OAUTH_CLIENT_SECRET
#     PAYGREEN_SECRET_KEY    (clé secrète PayGreen — jamais en clair)

[vars]
SITE_URL               = "https://maisoncbdvape.pages.dev"
PAYGREEN_ENV           = "sandbox"
PAYGREEN_SHOP_ID       = "sh_1c1feed3ab46464bb9efb870320acc71"
PAYGREEN_HMAC_KEY      = "d575f1a0-740a-4f77-81a0-cd952fca3671"
EMAIL_FROM             = "MaisonCBDVape <noreply@maisoncbdvape.fr>"
EMAIL_REPLY_TO         = "contact@maisoncbdvape.fr"
EMAIL_MERCHANT         = "vincent.kotowski@ikmail.com,contact@maisoncbdvape.fr"
GITHUB_OAUTH_CLIENT_ID = "Ov23liwMg8Mc7uBdzJj3"
GITHUB_REPO            = "FlowPesci/maisoncbdvape"
ADMIN_GITHUB_USERS     = "FlowPesci"

# ─── Bindings KV (commandes + état OAuth) ─────────────────────────────────
[[kv_namespaces]]
binding = "ORDERS_KV"
id = "912b7534e54b4658a08db0530e2e278b"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "e7ebbd4459e443ae99aa15f76ce30301"

# ─── Bindings R2 (médias : photos produits) ───────────────────────────────
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "tabacgex-media"
