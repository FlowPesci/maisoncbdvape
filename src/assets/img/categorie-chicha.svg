<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Univers Chicha">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0A0A0F"/>
      <stop offset="50%" stop-color="#12121A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <radialGradient id="accentGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.32"/>
      <stop offset="60%"  stop-color="#00D4FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00D4FF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#accentGlow)"/>

  <!-- Cadre néon discret -->
  <rect x="24" y="24" width="1152" height="582" rx="16" ry="16"
        fill="none" stroke="#00D4FF" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Mention TABAC GEX en haut à gauche -->
  <text x="48" y="68" fill="#00D4FF"
        font-family="'Space Mono', monospace" font-size="14"
        letter-spacing="6" style="text-transform:uppercase;">// TABAC GEX</text>

  <!-- Indicateur "PLACEHOLDER" en haut à droite -->
  <text x="1152" y="68" text-anchor="end" fill="#8A8A9A"
        font-family="'Space Mono', monospace" font-size="11"
        letter-spacing="4" style="text-transform:uppercase;">[ image en attente ]</text>

  <!-- Titre central -->
  <text x="600" y="327" text-anchor="middle" fill="#FFFFFF" font-family="'Bebas Neue', Impact, sans-serif" font-size="56" letter-spacing="2" style="text-transform:uppercase;">Univers Chicha</text>

  <text x="600" y="419" text-anchor="middle" fill="#00D4FF" font-family="'Space Mono', monospace" font-size="14" letter-spacing="6" style="text-transform:uppercase;">Catégorie · Chicha</text>

  <!-- Bandeau néon en bas -->
  <rect x="0" y="626" width="1200" height="4" fill="#00D4FF"/>
</svg>
